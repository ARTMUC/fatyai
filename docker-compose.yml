services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${GONE_DB_DATABASE}
      MYSQL_USER: ${GONE_DB_USERNAME}
      MYSQL_PASSWORD: ${GONE_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${GONE_DB_PASSWORD}
    ports:
      - "127.0.0.1:${GONE_DB_PORT:-3306}:3306"
    volumes:
      - mysql_volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${GONE_DB_USERNAME}", "-p${GONE_DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_volume:
